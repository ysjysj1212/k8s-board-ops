apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-board
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/my-org/ops-repo
    targetRevision: main
    path: charts/team-board
  destination:
    server: https://kubernetes.default.svc
    namespace: team-board
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
